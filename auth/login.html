<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="../assets/css/styles.css">
  
  <title>Frontend Mentor | Note-taking web app</title>
</head>
<body class="auth-bg">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="../assets/images/logo-dark.svg" alt="Notes Logo" class="auth-logo">
        <h1 class="auth-title">Welcome to Note</h1>
        <p class="auth-subtitle">Please log in to continue</p>
      </div>

      <form class="auth-form" action="../index.html">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
          <div class="form-label-row">
            <label for="password" class="form-label">Password</label>
            <a href="forgot-password.html" class="forgot-link">Forgot</a>
          </div>
          <div class="password-input-wrapper">
            <input type="password" id="password" class="form-input password-input" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <img src="../assets/images/icon-show-password.svg" alt="Show Password">
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit">Login</button>
      </form>

      <div class="auth-divider">
        <span>Or log in with:</span>
      </div>

      <button type="button" class="btn btn-secondary auth-social-btn">
        <img src="../assets/images/icon-google.svg" alt="Google Logo">
        Google
      </button>

      <p class="auth-footer">
        No account yet? <a href="#" class="signup-link">Sign Up</a>
      </p>
    </div>
  </div>
<script type="module" src="../assets/js/login.js"></script>
</body>
</html>
