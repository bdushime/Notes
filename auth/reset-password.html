<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="../assets/css/styles.css">
  
  <title>Reset Password | Note-taking web app</title>
</head>
<body class="auth-bg">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="../assets/images/logo-dark.svg" alt="Notes Logo" class="auth-logo">
        <h1 class="auth-title">Reset Your Password</h1>
        <p class="auth-subtitle">Choose a new password to secure your account.</p>
      </div>

      <form class="auth-form" action="login.html">
        <div class="form-group">
          <label for="new-password" class="form-label">New Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="new-password" class="form-input password-input" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <img src="../assets/images/icon-show-password.svg" alt="Show Password">
            </button>
          </div>
          <div class="auth-hint">
             <img src="../assets/images/icon-info.svg" alt="Info icon">
             <span>At least 8 characters</span>
          </div>
        </div>

        <div class="form-group">
          <label for="confirm-password" class="form-label">Confirm New Password</label>
          <div class="password-input-wrapper">
            <input type="password" id="confirm-password" class="form-input password-input" required>
            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
              <img src="../assets/images/icon-show-password.svg" alt="Show Password">
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary auth-submit">Reset Password</button>
      </form>

    </div>
  </div>

</body>
</html>
