 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="../assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="../assets/css/styles.css">
  
  <title>Forgot Password | Note-taking web app</title>
</head>
<body class="auth-bg">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <img src="../assets/images/logo-dark.svg" alt="Notes Logo" class="auth-logo">
        <h1 class="auth-title">Forgotten your password?</h1>
        <p class="auth-subtitle">Enter your email below, and we'll send you a link to reset it.</p>
      </div>

      <form class="auth-form" action="login.html">
        <div class="form-group">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="email@example.com" required>
        </div>

        <button type="submit" class="btn btn-primary auth-submit">Send Reset Link</button>
      </form>

    </div>
  </div>

</body>
</html>
