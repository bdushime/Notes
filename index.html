<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Source+Code+Pro:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Notes App | Frontend Mentor</title>
  </head>
  <body>
    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-header">
          <img
            src="./assets/images/logo.svg"
            alt="Notes Logo"
            class="sidebar-logo"
          />
        </div>

        <nav class="sidebar-nav">
          <ul class="nav-list">
            <li class="nav-item">
              <a href="#" class="nav-link active">
                <img
                  src="./assets/images/icon-home.svg"
                  alt=""
                  class="nav-icon"
                  aria-hidden="true"
                />
                <span>All Notes</span>
                <img
                  src="./assets/images/icon-chevron-right.svg"
                  alt=""
                  class="nav-chevron"
                  aria-hidden="true"
                />
              </a>
            </li>
            <li class="nav-item">
              <a href="#" class="nav-link">
                <img
                  src="./assets/images/icon-archive.svg"
                  alt=""
                  class="nav-icon"
                  aria-hidden="true"
                />
                <span>Archived Notes</span>
              </a>
            </li>
          </ul>

          <div class="nav-divider"></div>
          <div class="nav-section-title">Data</div>
          <ul class="nav-list">
            <li class="nav-item">
              <a href="#" class="nav-link" id="export-notes-btn">
                <img src="./assets/images/icon-archive.svg" alt="" class="nav-icon" aria-hidden="true" />
                <span>Export Notes</span>
              </a>
            </li>
            <li class="nav-item">
              <label class="nav-link" for="import-notes-input" style="cursor: pointer; margin: 0;">
                <img src="./assets/images/icon-plus.svg" alt="" class="nav-icon" aria-hidden="true" />
                <span>Import Notes</span>
                <input type="file" id="import-notes-input" accept=".json" style="display: none;" />
              </label>
            </li>
          </ul>

          <div class="nav-divider"></div>
          <div class="nav-section-title">Tags</div>
          <ul class="nav-list" id="sidebar-tags-list"></ul>
        </nav>
      </aside>

      <main class="main-content">
        <div class="mobile-logo-header">
          <img
            src="./assets/images/logo.svg"
            alt="Notes Logo"
            class="mobile-logo"
          />
        </div>

        <header class="top-header">
          <h1 class="page-title">All Notes</h1>

          <div class="header-actions">
            <div class="search-bar">
              <img
                src="./assets/images/icon-search.svg"
                alt=""
                class="search-icon"
                aria-hidden="true"
              />
              <input
                type="text"
                id="search-notes"
                class="search-input"
                placeholder="Search by title, content, or tags..."
                aria-label="Search notes"
              />
            </div>

            <a
              href="settings.html"
              class="icon-btn settings-btn"
              aria-label="Open Settings"
            >
              <img src="./assets/images/icon-settings.svg" alt="" aria-hidden="true" />
            </a>
          </div>
        </header>

        <div class="notes-layout">
          <div class="notes-list-col">
            <button class="btn btn-primary create-note-btn hidden-on-mobile">
              <img
                src="./assets/images/icon-plus.svg"
                alt=""
                class="plus-icon"
                aria-hidden="true"
              />
              Create New Note
            </button>

            <div class="notes-scroll-area">
              <div class="empty-state">
                <p>
                  You don't have any notes yet. Start a new note to capture your
                  thoughts and ideas.
                </p>
              </div>
            </div>

            <button class="fab create-note-fab visible-on-mobile" aria-label="Create new note">
              <img src="./assets/images/icon-plus.svg" alt="" aria-hidden="true" />
            </button>
          </div>

          <div class="note-editor-col">
            <div class="editor-mobile-header">
              <button class="icon-btn back-btn btn-text">
                <img src="./assets/images/icon-arrow-left.svg" alt="" aria-hidden="true" />
                Go Back
              </button>
              <div class="mobile-editor-actions">
                <button class="icon-btn" aria-label="Delete note">
                  <img src="./assets/images/icon-delete.svg" alt="" aria-hidden="true" />
                </button>
                <button class="icon-btn" aria-label="Archive note">
                  <img src="./assets/images/icon-archive.svg" alt="" aria-hidden="true" />
                </button>
                <button class="btn btn-text btn-cancel">Cancel</button>
                <button
                  type="submit"
                  form="note-form"
                  class="btn btn-text btn-save"
                >
                  Save Note
                </button>
              </div>
            </div>

            <form id="note-form" class="editor-content">
              <input
                type="text"
                class="editor-title-input"
                placeholder="Enter a title..."
                required
                aria-label="Note title"
              />
              <span id="title-error" class="error-message hidden">Title is required</span>
              
              <div class="editor-metadata">
                <div class="metadata-item">
                  <img
                    src="./assets/images/icon-tag.svg"
                    alt=""
                    class="meta-icon"
                    aria-hidden="true"
                  />
                  <label for="note-tags-input">Tags</label>
                  <input
                    id="note-tags-input"
                    type="text"
                    placeholder="Add tags separated by commas"
                  />
                </div>
                <div class="metadata-item">
                  <img
                    src="./assets/images/icon-clock.svg"
                    alt=""
                    class="meta-icon"
                    aria-hidden="true"
                  />
                  <span>Last edited</span>
                  <span class="timestamp">Not yet saved</span>
                </div>
              </div>
              <textarea
                class="editor-textarea"
                placeholder="Start typing your note here..."
                aria-label="Note content"
              ></textarea>
            </form>
            <div class="editor-actions">
              <span id="draft-status" class="draft-status"></span>

              <button type="submit" form="note-form" class="btn btn-primary">
                Save Note
              </button>
              <button type="button" class="btn btn-secondary">Cancel</button>
            </div>
          </div>

          <div class="note-meta-col" id="desktop-meta-actions">
            <button class="btn meta-btn">
              <img
                src="./assets/images/icon-archive.svg"
                alt=""
                class="meta-icon"
                aria-hidden="true"
              />
              Archive Note
            </button>
            <button class="btn meta-btn">
              <img
                src="./assets/images/icon-delete.svg"
                alt=""
                class="meta-icon"
                aria-hidden="true"
              />
              Delete Note
            </button>
          </div>
        </div>
      </main>

      <nav class="mobile-nav">
        <a href="#" class="mobile-nav-item active">
          <img src="./assets/images/icon-home.svg" alt="" aria-hidden="true" />
          <span>Home</span>
        </a>
        <a href="#" class="mobile-nav-item">
          <img src="./assets/images/icon-search.svg" alt="" aria-hidden="true" />
          <span>Search</span>
        </a>
        <a href="#" class="mobile-nav-item">
          <img src="./assets/images/icon-archive.svg" alt="" aria-hidden="true" />
          <span>Archived</span>
        </a>
        <a href="#" class="mobile-nav-item">
          <img src="./assets/images/icon-tag.svg" alt="" aria-hidden="true" />
          <span>Tags</span>
        </a>
        <a href="#" class="mobile-nav-item">
          <img src="./assets/images/icon-settings.svg" alt="" aria-hidden="true" />
          <span>Settings</span>
        </a>
      </nav>
    </div>


    <div id="delete-modal-overlay" 
         class="modal-overlay hidden" 
         role="dialog" 
         aria-modal="true" 
         aria-labelledby="modal-title">
      <div class="modal-card">
        <div class="modal-body">
          <div class="modal-icon-container">
            <img id="modal-icon" src="" alt="" class="modal-delete-icon" aria-hidden="true" />
          </div>
          <div class="modal-text-content">
            <h3 id="modal-title" class="modal-title"></h3>
            <p id="modal-subtitle" class="modal-subtitle"></p>
          </div>
        </div>
        <div class="modal-footer">
          <button id="modal-cancel-btn" class="btn btn-secondary modal-btn">Cancel</button>
          <button id="modal-confirm-delete-btn" class="modal-btn">Confirm</button>
        </div>
      </div>
    </div>

    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
