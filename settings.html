<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./assets/css/styles.css" />
    <title>Settings | Notes App</title>
  </head>
  <body>
    <div class="app-container">
      <main class="main-content settings-page-content">
        <header class="top-header">
          <div style="flex: 1">
            <a href="index.html" class="back-btn">
              <img
                src="./assets/images/icon-arrow-left.svg"
                alt=""
                style="filter: invert(1)"
              />
              <span>Go Back</span>
            </a>
          </div>

          <h1 class="page-title" style="flex: 2; text-align: center">
            Settings
          </h1>

          <div style="flex: 1"></div>
        </header>

        <div
          class="settings-scroll-area"
          style="padding: 2rem; max-width: 800px; overflow-y: auto; flex: 1;"
        >
          <section class="settings-section" style="margin-bottom: 3rem">
            <h2 style="font-size: var(--fs-2); margin-bottom: 1rem">
              Color Theme
            </h2>
            <p style="color: var(--clr-neutral-400); margin-bottom: 1.5rem">
              Choose your color theme:
            </p>

            <div
              class="options-vertical"
              style="display: flex; flex-direction: column; gap: 1rem"
            >
              <label class="option-item">
                <input type="radio" name="color-theme" value="light" />
                <div class="option-text">
                  <strong>Light Mode</strong>
                  <p>Pick a clean and classic light theme</p>
                </div>
              </label>

              <label class="option-item">
                <input type="radio" name="color-theme" value="dark" checked />
                <div class="option-text">
                  <strong>Dark Mode</strong>
                  <p>Select a sleek and modern dark theme</p>
                </div>
              </label>

              <label class="option-item">
                <input type="radio" name="color-theme" value="system" />
                <div class="option-text">
                  <strong>System</strong>
                  <p>Adapts to your device's theme</p>
                </div>
              </label>
            </div>
            <button
              id="apply-theme-btn"
              class="btn btn-primary"
              style="margin-top: 1.5rem"
            >
              Apply Changes
            </button>
          </section>

          <div class="nav-divider" style="margin: 2rem 0"></div>

          <section class="settings-section" style="margin-bottom: 3rem">
            <h2 style="font-size: var(--fs-2); margin-bottom: 1rem">
              Font Theme
            </h2>
            <p style="color: var(--clr-neutral-400); margin-bottom: 1.5rem">
              Choose your font theme:
            </p>

            <div
              class="options-vertical"
              style="display: flex; flex-direction: column; gap: 1rem"
            >
              <label class="option-item" style="font-family: 'Inter', sans-serif;">
                <input
                  type="radio"
                  name="font-theme"
                  value="sans-serif"
                  checked
                />
                <div class="option-text">
                  <strong>Sans-serif</strong>
                  <p>Clean and modern, easy to read.</p>
                </div>
              </label>

              <label class="option-item" style="font-family: 'Noto Serif', serif;">
                <input type="radio" name="font-theme" value="serif" />
                <div class="option-text">
                  <strong>Serif</strong>
                  <p>Classic and elegant for a timeless feel.</p>
                </div>
              </label>

              <label class="option-item" style="font-family: 'Source Code Pro', monospace;">
                <input type="radio" name="font-theme" value="monospace" />
                <div class="option-text">
                  <strong>Monospace</strong>
                  <p>Code-like, great for a technical vibe.</p>
                </div>
              </label>
            </div>
            
            <button
              id="apply-font-btn"
              class="btn btn-primary"
              style="margin-top: 1.5rem"
            >
              Apply Changes
            </button>
          </section>

          <div class="nav-divider" style="margin: 2rem 0"></div>

          <section class="settings-section" style="margin-bottom: 3rem">
            <h2 style="font-size: var(--fs-2); margin-bottom: 1rem">Change Password</h2>
            <form id="password-form" class="auth-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
              <div class="form-group">
                <label class="form-label">Old Password</label>
                <input type="password" class="form-input" required />
              </div>
              <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" class="form-input" placeholder="At least 8 characters" required />
              </div>
              <button type="submit" class="btn btn-primary">Save Password</button>
            </form>
          </section>

          <div class="nav-divider" style="margin: 2rem 0"></div>

          <button id="logout-btn" class="btn btn-secondary" style="width: 100%; margin-bottom: 2rem;">
            <img src="./assets/images/icon-logout.svg" alt="" style="filter: invert(1); width: 20px;" />
            <span>Logout</span>
          </button>
        </div>
      </main>
    </div>

    <script type="module" src="./assets/js/main.js"></script>
  </body>
</html>
